<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>IMAGINE.COFFEE 卸豆管理</title>

<!-- PWA / ホーム画面追加用 -->
<link rel="manifest" href="manifest-admin.json" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="IMAGINE 卸管理" />
<link rel="apple-touch-icon" href="icon-192.png" />
<meta name="theme-color" content="#FFFCF5" />

<style>
  :root {
    /* GASの警告バーの高さ。PC実測値は48px。
       スマホ幅では文字が折り返り高さが増えることがあるため
       メディアクエリで余裕を持たせています。実機で隙間/見切れが
       出る場合はここを調整してください。 */
    --banner-h: 48px;
    --banner-h-mobile: 96px;
  }
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    background: #FFFCF5;
  }
  .frame-wrap {
    position: fixed;
    inset: 0;
    overflow: hidden;
  }
  .frame-wrap iframe {
    position: absolute;
    left: 0;
    width: 100%;
    border: 0;
    top: calc(-1 * var(--banner-h));
    height: calc(100% + var(--banner-h));
  }
  @media (max-width: 600px) {
    .frame-wrap iframe {
      top: calc(-1 * var(--banner-h-mobile));
      height: calc(100% + var(--banner-h-mobile));
    }
  }
  .loading {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
    color: #9A9A96;
    font-size: 14px;
  }
  .key-form {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 12px;
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
    background: #FFFCF5;
  }
  .key-form input {
    padding: 12px 14px;
    font-size: 16px;
    border: 1.5px solid #1A1A18;
    border-radius: 10px;
    width: 240px;
  }
  .key-form button {
    padding: 12px 24px;
    font-size: 15px;
    font-weight: 600;
    background: #4FB8C9;
    color: white;
    border: 1.5px solid #1A1A18;
    border-radius: 999px;
    cursor: pointer;
  }
</style>
</head>
<body>
<div id="root"></div>
<script>
  // ここにデプロイ済みのGAS Web App URL(/exec)を設定
  var GAS_URL = "https://script.google.com/macros/s/AKfycbzFh8EZnEpMSN1-16sIs6TAkyVMalY9mqhjF020z7rqsDnTduODxotmYcZh85uTK6O2/exec";

  var params = new URLSearchParams(location.search);
  var key = params.get('key') || '';
  var root = document.getElementById('root');

  function showFrame(key) {
    root.innerHTML =
      '<div class="loading" id="loading">読み込み中...</div>' +
      '<div class="frame-wrap"><iframe id="appFrame" title="IMAGINE.COFFEE 卸豆管理"></iframe></div>';
    var frame = document.getElementById('appFrame');
    frame.src = GAS_URL + '?page=admin&key=' + encodeURIComponent(key);
    frame.addEventListener('load', function () {
      var el = document.getElementById('loading');
      if (el) el.style.display = 'none';
    });
  }

  function showKeyForm() {
    root.innerHTML =
      '<div class="key-form">' +
      '<div style="font-weight:700;font-size:18px;">管理キーを入力</div>' +
      '<input type="password" id="keyInput" placeholder="管理キー" />' +
      '<button id="goBtn">開く</button>' +
      '</div>';
    document.getElementById('goBtn').addEventListener('click', function () {
      var v = document.getElementById('keyInput').value.trim();
      if (!v) return;
      var url = new URL(location.href);
      url.searchParams.set('key', v);
      location.href = url.toString();
    });
  }

  if (key) {
    showFrame(key);
  } else {
    showKeyForm();
  }
</script>
</body>
</html>

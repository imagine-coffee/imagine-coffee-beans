<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>IMAGINE.COFFEE 卸豆管理</title>

<!-- PWA / ホーム画面追加用 -->
<link rel="manifest" href="manifest-admin.json" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="IMAGINE 卸管理" />
<link rel="apple-touch-icon" href="icon-192.png" />
<meta name="theme-color" content="#FFFCF5" />

<!--
  ============================================================
  admin.html の役割（2026-06 fetch版に変更）
  ============================================================
  以前は GAS の管理画面を iframe で埋め込み、Googleの警告バーを
  CSSで隠していました。iframe をやめ、管理キー入力後は同じ仕組みの
  fetch版管理画面 index.html?key=… へ渡すだけの「入口ページ」に変更。
  - iframe を使わないので Googleの警告バーは出ません。
  - GAS側の変更・再デプロイは不要です（index.html が fetch で通信）。
  - 既存の admin.html?key=… のブックマーク／ホーム画面もそのまま使えます。
  ============================================================
-->

<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #FFFCF5;
  }
  .loading {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
    color: #9A9A96;
    font-size: 14px;
  }
  .key-form {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 12px;
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
    background: #FFFCF5;
  }
  .key-form input {
    padding: 12px 14px;
    font-size: 16px;
    border: 1.5px solid #1A1A18;
    border-radius: 10px;
    width: 240px;
  }
  .key-form button {
    padding: 12px 24px;
    font-size: 15px;
    font-weight: 600;
    background: #4FB8C9;
    color: white;
    border: 1.5px solid #1A1A18;
    border-radius: 999px;
    cursor: pointer;
  }
</style>
</head>
<body>
<div id="root"></div>
<script>
  // 管理画面（fetch版）の実体。同じフォルダの index.html に渡す。
  var ADMIN_APP = 'index.html';

  var params = new URLSearchParams(location.search);
  var key = params.get('key') || '';
  var root = document.getElementById('root');

  // 管理画面(fetch版)へ渡す。iframeは使わないのでGoogleの警告バーは出ない。
  function goToAdmin(k) {
    root.innerHTML = '<div class="loading">読み込み中...</div>';
    location.replace(ADMIN_APP + '?key=' + encodeURIComponent(k));
  }

  function showKeyForm() {
    root.innerHTML =
      '<div class="key-form">' +
      '<div style="font-weight:700;font-size:18px;">管理キーを入力</div>' +
      '<input type="password" id="keyInput" placeholder="管理キー" />' +
      '<button id="goBtn">開く</button>' +
      '</div>';
    var input = document.getElementById('keyInput');
    function submit() {
      var v = input.value.trim();
      if (v) goToAdmin(v);
    }
    document.getElementById('goBtn').addEventListener('click', submit);
    input.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') submit();
    });
    input.focus();
  }

  if (key) {
    goToAdmin(key);
  } else {
    showKeyForm();
  }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="卸豆管理" />
<title>IMAGINE.COFFEE 卸豆管理</title>
<style>
  :root {
    --bg: #FFFCF5;
    --surface: #FFFFFF;
    --text: #1A1A18;
    --text-secondary: #5A5A56;
    --text-tertiary: #9A9A96;
    --border: #1A1A18;
    --border-soft: #E5E2D8;
    --accent-cyan: #4FB8C9;
    --accent-cyan-light: #DCF1F4;
    --accent-yellow: #F5D547;
    --accent-yellow-light: #FFF6D1;
    --accent-pink: #F4A8B8;
    --accent-pink-light: #FCE3E9;
    --accent-coral: #F08A5D;
    --accent-coral-light: #FBDBC9;
    --accent-red: #E85D5D;
    --accent-red-light: #F9D7D7;
    --accent-green: #A8CF8E;
    --accent-green-light: #E6F1DA;
    --shadow: 0 2px 0 var(--border);
    --shadow-lg: 0 3px 0 var(--border);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 16px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  .app {
    width: 100%;
    max-width: none;
    margin: 0 auto;
    padding: 18px 16px;
    padding-bottom: 100px;
  }

  /* ===== ヘッダー ===== */
  .header { margin-bottom: 22px; }
  .brand {
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--text-tertiary);
    margin: 0 0 4px;
    font-weight: 500;
  }
  .title-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
  }
  .title { font-size: 26px; font-weight: 700; margin: 0; }
  .sync-status {
    font-size: 12px;
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    gap: 5px;
    background: white;
    border: 1.5px solid var(--border);
    border-radius: 999px;
    padding: 6px 12px;
    box-shadow: var(--shadow);
  }
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-tertiary); }
  .sync-dot.online { background: var(--accent-green); }
  .sync-dot.offline { background: var(--accent-coral); }

  /* ===== タブ ===== */
  .tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 18px;
    overflow-x: auto;
    padding: 2px 0 4px;
    -webkit-overflow-scrolling: touch;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    background: white;
    border: 1.5px solid var(--border);
    border-radius: 999px;
    padding: 12px 18px;
    font-size: 14px;
    color: var(--text);
    cursor: pointer;
    font-family: inherit;
    font-weight: 500;
    white-space: nowrap;
    box-shadow: var(--shadow);
    transition: transform 0.18s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.18s ease, background 0.2s ease;
    flex-shrink: 0;
  }
  .tab:hover { transform: translateY(-1px); }
  .tab:active { transform: translateY(2px) scale(0.97); box-shadow: 0 0 0 var(--border); }
  .tab.active { background: var(--accent-cyan); color: white; }

  /* ===== プライマリボタン ===== */
  .btn-primary {
    width: 100%;
    background: var(--accent-cyan);
    color: white;
    border: 1.5px solid var(--border);
    border-radius: 999px;
    padding: 16px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin-bottom: 16px;
    font-family: inherit;
    box-shadow: var(--shadow-lg);
    transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.2s ease, filter 0.2s ease;
  }
  .btn-primary:hover { transform: translateY(-1px); filter: brightness(1.05); }
  .btn-primary:active { transform: translateY(3px) scale(0.98); box-shadow: 0 0 0 var(--border); }
  .btn-primary.yellow { background: var(--accent-yellow); color: var(--text); }
  .btn-primary.pink { background: var(--accent-pink); color: var(--text); }
  .btn-primary.red { background: var(--accent-red); color: white; }
  .order-actions {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 40px;
    background: rgba(255, 255, 255, 0.5);
    padding: 14px 16px;
    margin-bottom: 18px;
  }
  .order-actions .btn-primary {
    margin-bottom: 0;
  }

  /* ===== カード ===== */
  .card {
    background: white;
    border: 1.5px solid var(--border);
    border-radius: 18px;
    padding: 16px 18px;
    margin-bottom: 12px;
    box-shadow: var(--shadow);
    transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.2s ease;
    animation: cardIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(8px) scale(0.96); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .card:hover { transform: translateY(-2px); box-shadow: 0 4px 0 var(--border); }
  .card.cyan { background: var(--accent-cyan-light); }
  .card.yellow { background: var(--accent-yellow-light); }
  .card.pink { background: var(--accent-pink-light); }
  .card.coral { background: var(--accent-coral-light); }
  .card.red { background: var(--accent-red-light); }
  .card.green { background: var(--accent-green-light); }
  .card-head {
    display: flex;
    justify-content: space-between;
    align-items: start;
    gap: 10px;
    margin-bottom: 10px;
  }
  .card-title {
    font-size: 18px;
    font-weight: 700;
    margin: 0;
  }
  .card-meta {
    font-size: 13px;
    color: var(--text-secondary);
    margin: 0 0 3px;
    display: flex;
    align-items: baseline;
    gap: 8px;
    flex-wrap: wrap;
  }
  .meta-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-tertiary);
    letter-spacing: 0.05em;
    background: rgba(255,255,255,0.7);
    border: 1px solid var(--border-soft);
    border-radius: 4px;
    padding: 1px 7px;
    white-space: nowrap;
  }
  .card-memo-wrap {
    margin: 12px 0 0;
  }
  .card-memo-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: var(--text-tertiary);
    margin: 0 0 4px;
  }
  .card-memo {
    font-size: 13px;
    color: var(--text-secondary);
    margin: 0;
    padding: 10px 12px;
    background: rgba(255,255,255,0.6);
    border-radius: 10px;
    border: 1px solid var(--border-soft);
    white-space: pre-wrap;
  }
  .card-price {
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    margin: 4px 0 0;
  }

  /* 注文アイテム行表示 */
  .order-line {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin: 8px 0;
    padding: 8px 0;
    border-bottom: 1px dashed var(--border-soft);
  }
  .order-line:last-child { border-bottom: none; }
  .order-line-name {
    font-size: 17px;
    font-weight: 700;
    flex: 1;
  }
  .order-line-amount {
    font-size: 17px;
    font-weight: 700;
    white-space: nowrap;
  }
  .amount-pending {
    color: var(--accent-coral);
    font-size: 13px;
    font-weight: 800;
  }
  .order-line-meta {
    font-size: 12px;
    color: var(--text-secondary);
    font-weight: 500;
    margin-left: 6px;
  }
  .grind-tag {
    display: inline-block;
    background: var(--accent-coral-light);
    border: 1px solid var(--border);
    border-radius: 999px;
    font-size: 11px;
    padding: 2px 9px;
    margin-left: 4px;
    font-weight: 600;
    vertical-align: 1px;
  }

  /* ===== バッジ ===== */
  .badge {
    font-size: 12px;
    padding: 5px 11px;
    border-radius: 999px;
    font-weight: 600;
    white-space: nowrap;
    border: 1.5px solid var(--border);
  }
  .badge-active { background: var(--accent-green); }
  .badge-pending { background: var(--accent-pink-light); }
  .badge-pause { background: var(--accent-yellow); }
  .badge-end { background: white; color: var(--text-secondary); }
  .badge-bean { background: var(--accent-coral-light); }
  .badge-item { background: var(--accent-cyan-light); }
  .badge-variable { background: var(--accent-yellow-light); }

  /* ===== 小さいボタン ===== */
  .card-actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 14px;
  }
  .btn-small {
    background: white;
    border: 1.5px solid var(--border);
    border-radius: 999px;
    padding: 8px 14px;
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
    color: var(--text);
    font-weight: 500;
    box-shadow: 0 1.5px 0 var(--border);
    transition: transform 0.18s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.18s ease;
  }
  .btn-small:hover { transform: translateY(-1px); }
  .btn-small:active { transform: translateY(1.5px) scale(0.96); box-shadow: 0 0 0 var(--border); }
  .btn-small.cyan { background: var(--accent-cyan-light); }
  .btn-small.yellow { background: var(--accent-yellow-light); }
  .btn-small.green { background: var(--accent-green-light); }
  .btn-small.danger { color: var(--accent-coral); }

  /* ===== Empty ===== */
  .empty {
    text-align: center;
    color: var(--text-tertiary);
    font-size: 13px;
    padding: 40px 0;
  }

  /* ===== モーダル ===== */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(26, 26, 24, 0.5);
    z-index: 100;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .modal-overlay.show { opacity: 1; pointer-events: auto; }
  .modal {
    background: var(--bg);
    border-top: 1.5px solid var(--border);
    border-radius: 24px 24px 0 0;
    width: 100%;
    max-width: 720px;
    max-height: 92vh;
    overflow-y: auto;
    padding: 20px;
    transform: translateY(100%);
    transition: transform 0.25s ease-out;
    -webkit-overflow-scrolling: touch;
  }
  .modal-overlay.show .modal { transform: translateY(0); }
  .modal-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1.5px solid var(--border);
  }
  .modal-title { font-size: 18px; font-weight: 700; margin: 0; }
  .modal-close {
    background: white;
    border: 1.5px solid var(--border);
    border-radius: 999px;
    width: 32px;
    height: 32px;
    font-size: 16px;
    cursor: pointer;
    box-shadow: var(--shadow);
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.18s ease;
  }
  .modal-close:hover { transform: rotate(90deg); }
  .modal-close:active { transform: translateY(2px) scale(0.94); box-shadow: 0 0 0 var(--border); }

  /* ===== フォーム ===== */
  .field { margin-bottom: 16px; }
  .field-label {
    font-size: 13px;
    color: var(--text);
    display: block;
    margin-bottom: 6px;
    font-weight: 600;
  }
  .field-required::after { content: " *"; color: var(--accent-coral); }
  input[type="text"], input[type="number"], input[type="date"], input[type="tel"], input[type="url"], select, textarea {
    width: 100%;
    padding: 13px 15px;
    font-size: 16px;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    background: white;
    font-family: inherit;
    color: var(--text);
    -webkit-appearance: none;
    appearance: none;
    box-shadow: 0 1.5px 0 var(--border);
    transition: border-color 0.2s ease, box-shadow 0.2s ease;
  }
  /* 日付入力：カレンダーマーク部分だけクリックでピッカー表示 */
  input[type="date"] {
    background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%231A1A18' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3crect x='3' y='4' width='18' height='18' rx='2' ry='2'/%3e%3cline x1='16' y1='2' x2='16' y2='6'/%3e%3cline x1='8' y1='2' x2='8' y2='6'/%3e%3cline x1='3' y1='10' x2='21' y2='10'/%3e%3c/svg%3e");
    background-repeat: no-repeat;
    background-position: right 14px center;
    background-size: 18px;
    padding-right: 42px;
    position: relative;
  }
  /* マーク部分（右36px）だけクリック可能にする。残り（テキスト部分）はカレンダーを開かない */
  input[type="date"]::-webkit-calendar-picker-indicator {
    position: absolute;
    right: 0;
    top: 0;
    width: 42px;
    height: 100%;
    opacity: 0;
    cursor: pointer;
  }
  select {
    background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%231A1A18' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'/%3e%3c/svg%3e");
    background-repeat: no-repeat;
    background-position: right 12px center;
    background-size: 16px;
    padding-right: 38px;
    cursor: pointer;
  }
  textarea { resize: vertical; min-height: 60px; }
  input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: var(--accent-cyan);
    box-shadow: 0 0 0 3px var(--accent-cyan-light);
  }

  /* ===== 注文アイテム入力 ===== */
  .order-item {
    background: white;
    border: 1.5px dashed var(--border);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 10px;
  }
  .order-item-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }
  .order-item-num {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-secondary);
    background: var(--accent-yellow-light);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 2px 10px;
  }
  .order-item-del {
    background: var(--accent-pink-light);
    border: 1.5px solid var(--border);
    border-radius: 999px;
    width: 28px;
    height: 28px;
    font-size: 14px;
    cursor: pointer;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .input-mode-toggle {
    display: flex;
    gap: 4px;
    margin-bottom: 10px;
  }
  .input-mode-btn {
    flex: 1;
    background: white;
    border: 1.5px solid var(--border);
    border-radius: 999px;
    padding: 6px;
    font-size: 11px;
    cursor: pointer;
    font-family: inherit;
    font-weight: 500;
  }
  .input-mode-btn.active { background: var(--accent-cyan); color: white; }

  .price-display {
    background: var(--accent-yellow-light);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 8px;
  }
  .price-label {
    font-size: 11px;
    color: var(--text-secondary);
    font-weight: 500;
  }
  .price-edit {
    width: 120px !important;
    text-align: right;
    padding: 6px 10px !important;
    font-size: 14px !important;
    font-weight: 700;
  }
  .grind-toggle {
    display: flex;
    gap: 4px;
    margin-top: 8px;
  }
  .grind-btn {
    flex: 1;
    background: white;
    border: 1.5px solid var(--border);
    border-radius: 999px;
    padding: 6px;
    font-size: 12px;
    cursor: pointer;
    font-family: inherit;
    font-weight: 500;
  }
  .grind-btn.active { background: var(--accent-coral); color: white; }

  .btn-add-item {
    width: 100%;
    background: var(--accent-yellow-light);
    border: 1.5px dashed var(--border);
    border-radius: 12px;
    padding: 12px;
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 14px;
  }
  .order-summary {
    background: var(--accent-coral-light);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 12px;
    margin: 14px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .order-summary-label { font-size: 12px; font-weight: 600; }
  .order-summary-value { font-size: 20px; font-weight: 700; }

  /* ===== 商品マスタ：容量バリエーション ===== */
  .variant-list { margin-top: 10px; }
  .variant-row {
    display: grid;
    grid-template-columns: 1fr 1fr 36px;
    gap: 8px;
    margin-bottom: 8px;
    align-items: center;
  }
  .variant-row input { padding: 8px 10px !important; font-size: 14px !important; }
  .variant-del {
    background: var(--accent-pink-light);
    border: 1.5px solid var(--border);
    border-radius: 999px;
    width: 32px; height: 32px;
    cursor: pointer;
    padding: 0;
    font-size: 12px;
  }
  .variant-add {
    background: var(--accent-yellow-light);
    border: 1.5px dashed var(--border);
    border-radius: 999px;
    padding: 6px 14px;
    font-size: 12px;
    cursor: pointer;
    font-weight: 600;
    margin-top: 4px;
  }
  .variant-badge {
    display: inline-block;
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 999px;
    background: white;
    border: 1px solid var(--border);
    margin: 2px 4px 2px 0;
    font-weight: 500;
  }
  .item-type-toggle {
    display: flex;
    gap: 4px;
    margin-bottom: 12px;
  }
  .item-type-btn {
    flex: 1;
    background: white;
    border: 1.5px solid var(--border);
    border-radius: 999px;
    padding: 8px;
    font-size: 12px;
    cursor: pointer;
    font-family: inherit;
    font-weight: 500;
  }
  .item-type-btn.active { background: var(--accent-cyan); color: white; }

  /* ===== 焙煎計画 ===== */
  .planning-filter {
    background: white;
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 14px;
    margin-bottom: 16px;
    box-shadow: var(--shadow);
  }
  .planning-filter-title {
    font-size: 12px;
    font-weight: 600;
    margin: 0 0 8px;
    color: var(--text-secondary);
  }
  .planning-filter-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .planning-filter-row input[type="date"] {
    flex: 1;
    padding: 9px 12px !important;
    font-size: 14px !important;
  }
  .planning-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    background: white;
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 12px 14px;
    margin-bottom: 8px;
    box-shadow: var(--shadow);
    cursor: pointer;
    transition: transform 0.15s ease, background 0.2s ease;
  }
  .planning-item:active { transform: translateY(1px); }
  .planning-item.selected { background: var(--accent-cyan-light); }
  .planning-check {
    width: 22px !important;
    height: 22px !important;
    margin: 0 !important;
    padding: 0 !important;
    cursor: pointer;
    box-shadow: none !important;
    accent-color: var(--accent-cyan);
    flex-shrink: 0;
    margin-top: 2px !important;
  }
  .planning-item-body { flex: 1; min-width: 0; }
  .planning-item-shop {
    font-size: 15px;
    font-weight: 700;
    margin: 0 0 2px;
  }
  .planning-item-meta {
    font-size: 11px;
    color: var(--text-tertiary);
    margin: 0 0 4px;
  }
  .planning-item-items {
    font-size: 13px;
    color: var(--text-secondary);
    margin: 0;
  }
  .planning-result {
    background: var(--accent-yellow-light);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    padding: 14px;
    margin-bottom: 16px;
    box-shadow: var(--shadow-lg);
  }
  .planning-result-title {
    font-size: 14px;
    font-weight: 700;
    margin: 0 0 10px;
    padding-bottom: 8px;
    border-bottom: 1.5px dashed var(--border);
  }
  .planning-result-section {
    margin: 14px 0 16px;
  }
  .planning-result-section-title {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    background: white;
    border: 1.5px solid var(--border);
    border-radius: 999px;
    box-shadow: var(--shadow);
    padding: 8px 14px;
    margin: 0 0 10px;
    font-size: 14px;
    font-weight: 800;
  }
  .planning-result-section-title.bean {
    background: var(--accent-coral-light);
  }
  .planning-result-section-title.other {

<script>
// ============================================================
// IMAGINE.COFFEE 卸豆管理アプリ v3
// ============================================================
// 管理キー：Apps Script配信時は doGet で key 検証済みのうえ、テンプレートでここに注入される。
// （GASのサンドボックスiframeでは location.search に ?key= が引き継がれないため、注入方式を使う）
// ローカルファイルで開いた場合は注入されないので、URLの ?key= から読む。
const INJECTED_ADMIN_KEY = '<?!= adminKey ?>';
const ADMIN_ACCESS_KEY = INJECTED_ADMIN_KEY.indexOf('\x3c?') === -1
  ? INJECTED_ADMIN_KEY
  : (new URLSearchParams(location.search).get('key') || '');

const STORAGE_KEYS = {
  GAS_URL: 'imagine_gas_url',
  ORDERS: 'imagine_orders_cache',
  SHOPS: 'imagine_shops_cache',
  ITEMS: 'imagine_items_cache',
  DRAFT_ORDER: 'imagine_draft_order',
  DRAFT_SHOP: 'imagine_draft_shop',
  DRAFT_ITEM: 'imagine_draft_item',
  CURRENT_TAB: 'imagine_current_tab',
  PENDING_OPS: 'imagine_pending_ops'
};

// どの端末でも自動接続できるようGAS URLを既定値として埋め込み（端末ごとの手入力を不要にする）
const DEFAULT_GAS_URL = 'https://script.google.com/macros/s/AKfycbzFh8EZnEpMSN1-16sIs6TAkyVMalY9mqhjF020z7rqsDnTduODxotmYcZh85uTK6O2/exec';

let state = {
  orders: [],
  shops: [],
  items: [],  // 商品マスタ（豆・バッグなど）
  settings: [],
  gasUrl: (function(){ var u = (localStorage.getItem(STORAGE_KEYS.GAS_URL) || '').trim(); return /\/exec$/.test(u) ? u : DEFAULT_GAS_URL; })(),
  online: false,
  currentTab: localStorage.getItem(STORAGE_KEYS.CURRENT_TAB) || 'orders'
};

// ============================================================
// ユーティリティ
// ============================================================
function $(id) { return document.getElementById(id); }
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }
function appScriptUrl() {
  if (state.gasUrl) return state.gasUrl;
  if (location.protocol.indexOf('http') === 0) return location.href.split('?')[0];
  return '';
}
function toast(msg) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}
function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
// 受け取り方法の選択肢（ここで一元管理）
const PLACE_OPTIONS = ['伊勢宮店', 'SUNAGODA店', 'ロースタリー', '配送でのお受け取り'];
function placeOptionsHtml(selected) {
  return PLACE_OPTIONS.map(p => `<option value="${escapeHtml(p)}" ${selected === p ? 'selected' : ''}>${escapeHtml(p)}</option>`).join('');
}
function imageSrc(url) {
  const raw = String(url || '').trim();
  if (!raw) return '';
  const driveMatch = raw.match(/drive\.google\.com\/file\/d\/([^/]+)/) || raw.match(/[?&]id=([^&]+)/);
  if (driveMatch) return 'https://drive.google.com/thumbnail?id=' + encodeURIComponent(driveMatch[1]) + '&sz=w1200';
  return raw;
}
function productImageHtml(url, alt) {
  const src = imageSrc(url);
  if (!src) return '';
  return `<img src="${escapeHtml(src)}" alt="${escapeHtml(alt || '')}" loading="lazy" onerror="this.style.display='none';" style="width:64px; height:64px; object-fit:cover; border:1.5px solid var(--border); border-radius:12px; margin: 4px 0 10px; background:white;" />`;
}
function formatYen(n) {
  if (!n && n !== 0) return '';
  return '¥' + Math.round(Number(n)).toLocaleString();
}
function orderHasPendingAmount(o) {
  return (o.items || []).some(it => !(Number(it.amount) > 0));
}
function formatVariantPrice(v) {
  return Number(v.price) > 0 ? formatYen(v.price) : '価格未登録';
}

function variantPriceForItem(item, kind, size) {
  if (!item || !size) return 0;
  const matched = variantsForItem(item, kind).find(v => String(v.size) === String(size));
  return matched ? Number(matched.price) || 0 : 0;
}

// ============================================================
// GAS連携
// ============================================================
// ============================================================
// API通信
// google.script.run（Apps Script配信時）優先・fetch（ローカル時）フォールバック
// ============================================================
const USE_GOOGLE_SCRIPT = (typeof google !== 'undefined' && google.script && google.script.run);

async function gasRequest(action, payload = {}) {
  const requestPayload = Object.assign({}, payload);
  if (ADMIN_ACCESS_KEY) {
    requestPayload.__adminKey = ADMIN_ACCESS_KEY;
  }
  // Apps Scriptから配信されている場合は google.script.run を使う（CORS問題なし）
  if (USE_GOOGLE_SCRIPT) {
    return new Promise((resolve, reject) => {
      google.script.run
        .withSuccessHandler(result => {
          if (result && result.error) reject(new Error(result.error));
          else resolve(result);
        })
        .withFailureHandler(err => reject(err))
        .apiHandler(action, requestPayload);
    });
  }
  // ローカルファイルから開いている場合は fetch を使う
  if (!state.gasUrl) throw new Error('GAS URL未設定');
  const url = state.gasUrl + '?action=' + encodeURIComponent(action);
  const res = await fetch(url, {
    method: 'POST',
    body: JSON.stringify(requestPayload),
    headers: { 'Content-Type': 'text/plain;charset=utf-8' }
  });
  if (!res.ok) throw new Error('通信エラー');
  return await res.json();
}

async function syncFromServer() {
  // Apps Script配信時はgoogle.script.runで通信、ローカル時はgasUrl必須
  if (!USE_GOOGLE_SCRIPT && !state.gasUrl) return false;
  try {
    // 先に未送信キューを再送してから最新データを取得（ローカル変更がlistで上書きされて消えるのを防ぐ）
    await flushPendingOps();
    const data = await gasRequest('list');
    state.orders = data.orders || [];
    state.shops = data.shops || [];
    state.items = data.items || [];
    state.settings = data.settings || [];
    saveCache();
    setOnline(true);
    return true;
  } catch (e) {
    setOnline(false);
    return false;
  }
}

function setOnline(ok) {
  state.online = ok;
  const dot = $('sync-dot');
  const txt = $('sync-text');
  if (ok) {
    dot.className = 'sync-dot online';
    txt.textContent = '接続中';
  } else if (USE_GOOGLE_SCRIPT || state.gasUrl) {
    dot.className = 'sync-dot offline';
    txt.textContent = 'オフライン';
  } else {
    dot.className = 'sync-dot';
    txt.textContent = '未接続';
  }
  $('config-ok').style.display = ok ? 'block' : 'none';
  $('config-warn').style.display = ok ? 'none' : 'block';
}

function saveCache() {
  localStorage.setItem(STORAGE_KEYS.ORDERS, JSON.stringify(state.orders));
  localStorage.setItem(STORAGE_KEYS.SHOPS, JSON.stringify(state.shops));
  localStorage.setItem(STORAGE_KEYS.ITEMS, JSON.stringify(state.items));
}

function loadCache() {
  try {
    state.orders = JSON.parse(localStorage.getItem(STORAGE_KEYS.ORDERS) || '[]');
    state.shops = JSON.parse(localStorage.getItem(STORAGE_KEYS.SHOPS) || '[]');
    state.items = JSON.parse(localStorage.getItem(STORAGE_KEYS.ITEMS) || '[]');
  } catch (e) {
    state.orders = []; state.shops = []; state.items = [];
  }
}

// ============================================================
// オフライン再送キュー
// 通信失敗した書き込みをlocalStorageに積み、接続回復時に自動再送する
// ============================================================
function loadPendingOps() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEYS.PENDING_OPS) || '[]');
  } catch (e) {
    return [];
  }
}

function savePendingOps(ops) {
  localStorage.setItem(STORAGE_KEYS.PENDING_OPS, JSON.stringify(ops));
}

async function sendOrQueue(action, payload) {
  try {
    await gasRequest(action, payload);
    return true;
  } catch (e) {
    const ops = loadPendingOps();
    ops.push({ action: action, payload: payload, queuedAt: new Date().toISOString() });
    savePendingOps(ops);
    toast('通信できないため一時保存しました。接続回復後に自動送信します');
    return false;
  }
}

async function flushPendingOps() {
  let ops = loadPendingOps();
  let sent = 0;
  while (ops.length > 0) {
    try {
      await gasRequest(ops[0].action, ops[0].payload);
      ops.shift();
      savePendingOps(ops);
      sent++;
    } catch (e) {
      break; // まだ繋がらない場合は次回の同期で再試行
    }
  }
  if (sent > 0) toast('未送信だった' + sent + '件をサーバーに送信しました');
  return ops.length === 0;
}

// ============================================================
// レンダリング
// ============================================================
function shopStatusBadge(status) {
  const map = {
    'active': { label: '契約中', cls: 'badge-active' },
    'pending': { label: '確認待ち', cls: 'badge-pending' },
    'pause': { label: '休止中', cls: 'badge-pause' },
    'end': { label: '終了', cls: 'badge-end' }
  };
  const s = map[status] || map['active'];
  return `<span class="badge ${s.cls}">${s.label}</span>`;
}

function orderTotalAmount(o) {
  if (!o.items || !o.items.length) return 0;
  return o.items.reduce((sum, it) => sum + (Number(it.amount) || 0), 0);
}

// 注文内容を「豆 → その他商品」の順に並び替え
function sortedOrderItems(o) {
  if (!o.items || !o.items.length) return [];
  const beans = o.items.filter(it => it.type === 'bean');
  const others = o.items.filter(it => it.type !== 'bean');
  return [...beans, ...others];
}

function orderItemsLines(o) {
  return sortedOrderItems(o).map(it => {
    const name = escapeHtml(it.name);
    const blendName = it.customBlendName ? `<span class="order-line-meta">${escapeHtml(it.customBlendName)}</span>` : '';
    const variant = it.variant ? `<span class="order-line-meta">${escapeHtml(it.variant)}</span>` : '';
    const quantity = Number(it.quantity) > 1 ? `<span class="order-line-meta">×${escapeHtml(it.quantity)}</span>` : '';
    const grind = (it.type === 'bean' && it.grind === 'ground') ? `<span class="grind-tag">挽き豆</span>` : '';
    const amount = Number(it.amount) > 0 ? formatYen(it.amount) : '<span class="amount-pending">価格未登録</span>';
    return `
      <div class="order-line">
        <div class="order-line-name">${name}${blendName}${variant}${quantity}${grind}</div>
        <div class="order-line-amount">${amount}</div>
      </div>
    `;
  }).join('');
}

// ============================================================
// 焙煎計画
// ============================================================
let planningSelected = new Set();

function parseGrams(variant) {
  if (!variant) return 0;
  const s = String(variant).trim().toLowerCase();
  // kg優先
  const kgMatch = s.match(/(\d+(?:\.\d+)?)\s*kg/);
  if (kgMatch) return parseFloat(kgMatch[1]) * 1000;
  const gMatch = s.match(/(\d+(?:\.\d+)?)\s*g/);
  if (gMatch) return parseFloat(gMatch[1]);
  return 0;
}

function formatGrams(g) {
  if (!g) return '0g';
  if (g >= 1000) {
    const kg = g / 1000;
    const rounded = Math.round(kg * 100) / 100;
    return rounded.toLocaleString() + 'kg';
  }
  return Math.round(g).toLocaleString() + 'g';
}

function getPlanningTargetOrders() {
  const active = state.orders.filter(o => o.status !== 'done' && o.status !== 'canceled');
  const from = $('planning-from') ? $('planning-from').value : '';
  const to = $('planning-to') ? $('planning-to').value : '';
  return active.filter(o => {
    if (!from && !to) return true;
    if (!o.delivery) return false; // 期間フィルター有効時、日付未定は除外
    if (from && o.delivery < from) return false;
    if (to && o.delivery > to) return false;
    return true;
  });
}

function renderPlanning() {
  const listEl = $('planning-orders-list');
  if (!listEl) return;
  const filtered = getPlanningTargetOrders();

  if (filtered.length === 0) {
    listEl.innerHTML = '<p class="empty">対象期間に注文がありません</p>';
    renderPlanningResult();
    return;
  }
  // 受け渡し予定日順にソート
  const sorted = [...filtered].sort((a, b) => (a.delivery || '9999').localeCompare(b.delivery || '9999'));

  listEl.innerHTML = sorted.map(o => {
    const isChecked = planningSelected.has(o.id);
    const items = sortedOrderItems(o).map(it => {
      const grind = (it.type === 'bean' && it.grind === 'ground') ? '（挽き豆）' : '';
      const variant = it.variant ? ' ' + it.variant : '';
      const quantity = Number(it.quantity) > 1 ? ' ×' + it.quantity : '';
      return escapeHtml(it.name) + escapeHtml(variant) + grind + escapeHtml(quantity);
    }).join('、');
    return `
      <label class="planning-item ${isChecked ? 'selected' : ''}" data-id="${o.id}">
        <input type="checkbox" class="planning-check" data-id="${o.id}" ${isChecked ? 'checked' : ''} />
        <div class="planning-item-body">
          <p class="planning-item-shop">${escapeHtml(o.shop)}</p>
          <p class="planning-item-meta">お渡し・お届け: ${escapeHtml(o.delivery || '日付未定')}</p>
          <p class="planning-item-items">${items}</p>
        </div>
      </label>
    `;
  }).join('');

  document.querySelectorAll('.planning-check').forEach(c => {
    c.addEventListener('change', (e) => {
      e.stopPropagation();
      if (c.checked) planningSelected.add(c.dataset.id);
      else planningSelected.delete(c.dataset.id);
      renderPlanning();
    });
  });

  renderPlanningResult();
}

function renderPlanningResult() {
  const resultEl = $('planning-result');
  if (!resultEl) return;
  const selected = state.orders.filter(o => planningSelected.has(o.id));

  if (selected.length === 0) {
    resultEl.innerHTML = '<div class="planning-result"><p style="font-size: 13px; color: var(--text-secondary); margin: 0; text-align: center; padding: 6px 0;">注文にチェックを入れると集計が表示されます</p></div>';
    return;
  }

  // 商品ごとに集計
  const agg = {}; // {商品名: {whole, ground, isBean, unparseable}}

  selected.forEach(order => {
    (order.items || []).forEach(item => {
      const key = item.name;
      if (!agg[key]) agg[key] = { whole: 0, ground: 0, isBean: item.type === 'bean', unparseable: [] };

      const quantity = Math.max(1, Number(item.quantity) || 1);
      const grams = parseGrams(item.variant) * quantity;
      if (grams === 0) {
        // gでない単位（例：5個入）はそのまま記録
        agg[key].unparseable.push((item.variant || '?') + (quantity > 1 ? ' ×' + quantity : '') + (item.grind === 'ground' ? '（挽き豆）' : ''));
        return;
      }
      if (item.type === 'bean' && item.grind === 'ground') {
        agg[key].ground += grams;
      } else {
        agg[key].whole += grams;
      }
    });
  });

  const names = Object.keys(agg);
  names.sort((a, b) => {
    if (agg[a].isBean && !agg[b].isBean) return -1;
    if (!agg[a].isBean && agg[b].isBean) return 1;
    return a.localeCompare(b);
  });

  let beanTotal = 0;
  let otherTotal = 0;

  const makePlanningCard = (name) => {
    const v = agg[name];
    const total = v.whole + v.ground;
    if (v.isBean) beanTotal += total;
    else otherTotal += total;
    const unparseStr = v.unparseable.length > 0 
      ? `<p class="planning-result-line">その他 <span>${escapeHtml(v.unparseable.join('、'))}</span></p>` 
      : '';

    if (v.isBean) {
      return `
        <div class="planning-result-card">
          <p class="planning-result-name">${escapeHtml(name)}</p>
          ${v.whole > 0 ? `<p class="planning-result-line">豆のまま <span>${formatGrams(v.whole)}</span></p>` : ''}
          ${v.ground > 0 ? `<p class="planning-result-line">挽き豆 <span>${formatGrams(v.ground)}</span></p>` : ''}
          ${unparseStr}
          ${total > 0 ? `<p class="planning-result-total">合計 <span>${formatGrams(total)}</span></p>` : ''}
        </div>
      `;
    } else {
      return `
        <div class="planning-result-card">
          <p class="planning-result-name">${escapeHtml(name)}</p>
          ${total > 0 ? `<p class="planning-result-line">数量 <span>${formatGrams(total)}</span></p>` : ''}
          ${unparseStr}
        </div>
      `;
    }
  };

  const beanNames = names.filter(name => agg[name].isBean);
  const otherNames = names.filter(name => !agg[name].isBean);
  const beanCards = beanNames.map(makePlanningCard).join('');
  const otherCards = otherNames.map(makePlanningCard).join('');
  const grandTotal = beanTotal + otherTotal;

  resultEl.innerHTML = `
    <div class="planning-result">
      <p class="planning-result-title">集計結果（${selected.length}件の注文）</p>
      ${beanCards ? `
        <div class="planning-result-section">
          <p class="planning-result-section-title bean">
            <span>焙煎豆</span>
            <span class="planning-result-section-count">${beanNames.length}商品 / ${formatGrams(beanTotal)}</span>
          </p>
          ${beanCards}
        </div>
      ` : ''}
      ${otherCards ? `
        <div class="planning-result-section">
          <p class="planning-result-section-title other">
            <span>その他の商品</span>
            <span class="planning-result-section-count">${otherNames.length}商品${otherTotal > 0 ? ' / ' + formatGrams(otherTotal) : ''}</span>
          </p>
          ${otherCards}
        </div>
      ` : ''}
      ${grandTotal > 0 ? `<div class="planning-grand-total"><span>全体合計</span><span>${formatGrams(grandTotal)}</span></div>` : ''}
    </div>
  `;
}

// 印刷モードの後片付け。
// iPad/iPhoneのSafariは window.print() がすぐ戻ってくるため、タイマーで消すと
// 印刷プレビュー生成前にモードが解除されてしまい、画面全体が印刷されてしまう。
// そのためタイマーは使わず、印刷終了イベント＋次回印刷時のリセットで掃除する。
// （印刷用クラスは @media print 内でしか効かないので、画面表示には影響しない）
function clearPrintMode() {
  document.body.classList.remove('print-planning');
  document.body.classList.remove('print-delivery');
  $('delivery-note-print').innerHTML = '';
}
window.addEventListener('afterprint', clearPrintMode);
if (window.matchMedia) {
  try {
    window.matchMedia('print').addEventListener('change', mql => {
      if (!mql.matches) clearPrintMode();
    });
  } catch (e) {}
}

function printPlanningResult() {
  if (planningSelected.size === 0) {
    alert('PDF/印刷する注文にチェックを入れてください');
    return;
  }
  clearPrintMode();
  document.body.classList.add('print-planning');
  window.print();
}

function deliveryItemDescription(item) {
  return [
    item.name,
    item.customBlendName,
    item.variant,
    item.type === 'bean' ? (item.grind === 'ground' ? '挽き豆' : '豆のまま') : ''
  ].filter(Boolean).join(' / ');
}

function deliveryNoteRows(order) {
  return sortedOrderItems(order).map((item, idx) => {
    const qty = Number(item.quantity) > 1 ? item.quantity : 1;
    const amount = Number(item.amount) || 0;

let currentOrderItems = [];

function orderItemHtml(item, idx) {
  const beanItems = state.items.filter(x => x.type === 'bean' && (isShopItem(x) || x.id === item.itemId));
  const otherItems = state.items.filter(x => x.type !== 'bean' && (isShopItem(x) || x.id === item.itemId));
  let itemOptions = '';
  if (beanItems.length > 0) {
    itemOptions += '<optgroup label="豆">' +
      beanItems.map(x => `<option value="${escapeHtml(x.id)}" ${item.itemId === x.id ? 'selected' : ''}>${escapeHtml(x.name)}</option>`).join('') +
      '</optgroup>';
  }
  if (otherItems.length > 0) {
    itemOptions += '<optgroup label="その他商品">' +
      otherItems.map(x => `<option value="${escapeHtml(x.id)}" ${item.itemId === x.id ? 'selected' : ''}>${escapeHtml(x.name)}</option>`).join('') +
      '</optgroup>';
  }

  let variantSection = '';

  if (item.itemId) {
    const selectedItem = state.items.find(x => x.id === item.itemId);
    if (selectedItem) {
      const variants = variantsForItem(selectedItem, 'shop');
      if (variants.length > 0) {
        const shopOptions = variants.map(v =>
          `<option value="${escapeHtml(v.size)}" ${item.variant === v.size ? 'selected' : ''}>${escapeHtml(v.size)}${Number(v.price) > 0 ? ' / ' + formatYen(v.price) : ''}</option>`
        ).join('');
        variantSection = `
          <div class="field" style="margin-bottom:8px;">
            <select class="oi-variant-select" data-idx="${idx}">
              <option value="">容量・種類を選択</option>
              ${shopOptions}
            </select>
          </div>
        `;
      }
    }
  }

  return `
    <div class="order-item" data-idx="${idx}">
      <div class="order-item-head">
        <span class="order-item-num">#${idx + 1}</span>
        ${currentOrderItems.length > 1 ? `<button class="order-item-del oi-del" data-idx="${idx}">✕</button>` : ''}
      </div>
      <div class="field" style="margin-bottom:8px;">
        <select class="oi-item-select" data-idx="${idx}">
          <option value="">商品を選択</option>
          ${itemOptions}
        </select>
      </div>
      ${variantSection}
      <div class="field" style="margin-bottom:8px;">
        <label class="field-label" style="font-size:12px; margin-bottom:4px;">納品書用の金額</label>
        <input type="number" class="oi-amount" data-idx="${idx}" value="${escapeHtml(item.amount || '')}" min="0" inputmode="numeric" placeholder="価格を入力" />
      </div>
    </div>
  `;
}

function renderOrderItems() {
  const container = $('oi-container');
  if (!container) return;
  container.innerHTML = currentOrderItems.map((it, idx) => orderItemHtml(it, idx)).join('');
  attachOrderItemHandlers();
  saveDraft();
}

function attachOrderItemHandlers() {
  document.querySelectorAll('.oi-item-select').forEach(el => {
    el.addEventListener('change', () => {
      const idx = +el.dataset.idx;
      const item = state.items.find(x => x.id === el.value);
      currentOrderItems[idx].itemId = el.value;
      currentOrderItems[idx].name = item ? item.name : '';
      currentOrderItems[idx].type = item ? item.type : 'bean';
      currentOrderItems[idx].variant = '';
      currentOrderItems[idx].amount = '';
      renderOrderItems();
    });
  });
  document.querySelectorAll('.oi-variant-select').forEach(el => {
    el.addEventListener('change', () => {
      const idx = +el.dataset.idx;
      const row = currentOrderItems[idx];
      row.variant = el.value;
      const item = state.items.find(x => x.id === row.itemId);
      const price = variantPriceForItem(item, 'shop', row.variant);
      row.amount = price > 0 ? price : '';
      updateAmountDisplay(idx);
      saveDraft();
    });
  });
  document.querySelectorAll('.oi-amount').forEach(el => {
    el.addEventListener('input', () => {
      currentOrderItems[+el.dataset.idx].amount = el.value;
    });
  });
  document.querySelectorAll('.oi-del').forEach(el => {
    el.addEventListener('click', () => {
      currentOrderItems.splice(+el.dataset.idx, 1);
      if (currentOrderItems.length === 0) {
        currentOrderItems.push({ mode: 'master', itemId: '', variant: '', quantity: 1, type: 'bean', grind: 'whole' });
      }
      renderOrderItems();
    });
  });
}

function updateAmountDisplay(idx) {
  const el = document.querySelector(`.oi-amount[data-idx="${idx}"]`);
  if (el && !currentOrderItems[idx].amountManual) {
    el.value = currentOrderItems[idx].amount || '';
  }
}

function openOrderModal(orderId) {
  let editingOrder = null;
  if (orderId) {
    editingOrder = state.orders.find(o => o.id === orderId);
    if (!editingOrder) return;
    currentOrderItems = editingOrder.items ? JSON.parse(JSON.stringify(editingOrder.items)) : [];
    currentOrderItems.forEach(it => { if (!it.mode) it.mode = it.itemId ? 'master' : 'manual'; });
  } else {
    const draft = loadDraft('order');
    if (draft && draft.items && draft.items.length) {
      if (confirm('前回の入力途中の内容があります。続きから書きますか？')) {
        currentOrderItems = draft.items;
      } else {
        clearDraft('order');
        currentOrderItems = [{ mode: 'master', itemId: '', name: '', variant: '', amount: '', type: 'bean', grind: 'whole' }];
      }
    } else {
      currentOrderItems = [{ mode: 'master', itemId: '', name: '', variant: '', amount: '', type: 'bean', grind: 'whole' }];
    }
  }

  const draft = editingOrder ? null : loadDraft('order');
  const today = new Date().toISOString().slice(0, 10);
  const initShop = editingOrder ? editingOrder.shop : (draft && draft.shop) || '';
  const staffShopNames = ['伊勢宮', 'SUNAGODA'];
  const shopOptions = staffShopNames.map(name =>
    `<option value="${escapeHtml(name)}" ${initShop === name ? 'selected' : ''}>${escapeHtml(name)}</option>`
  ).join('') + (initShop && staffShopNames.indexOf(initShop) === -1

    : '');

  const initStaff = editingOrder ? (editingOrder.staff || '') : (draft && draft.staff) || '';
  const initMemo = editingOrder ? (editingOrder.memo || '') : (draft && draft.memo) || '';

    <div class="field">
      <label class="field-label field-required">店舗名</label>
      <select id="o-shop"><option value="">選択してください</option>${shopOptions}</select>
    </div>
    <div class="field">
      <label class="field-label">注文日</label>
      <input type="date" id="o-date" value="${initDate}" />
    </div>

    <div style="margin: 16px 0 10px; font-size:13px; font-weight:600;">注文内容</div>
    <div id="oi-container"></div>
    <button class="btn-add-item" id="btn-add-item">＋ 商品を追加する</button>

    <div class="field">
      <label class="field-label">担当スタッフ</label>
      <input type="text" id="o-staff" placeholder="なまえ" value="${escapeHtml(initStaff)}" />
    </div>
    <div class="field">
      <label class="field-label">メモ</label>
      <textarea id="o-memo" rows="2" placeholder="特記事項">${escapeHtml(initMemo)}</textarea>
    </div>
    <div class="field">
      <label style="display:flex; align-items:center; gap:8px; font-size:14px; font-weight:600;">
        <input type="checkbox" id="o-notify-slack" ${initNotifySlack ? 'checked' : ''} style="width:auto; box-shadow:none;" />
        Slackに共有する
      </label>
    </div>
    <input type="hidden" id="o-id" value="${editingOrder ? editingOrder.id : ''}" />
    <button class="btn-primary" id="save-order" style="margin-bottom:12px;">${editingOrder ? '更新する' : '保存する'}</button>
  `;

  openModal(editingOrder ? '注文を編集' : '新しい注文', body);

  });

function saveDraft() {
  const shop = $('o-shop'); if (!shop) return;
  const draft = {
    shop: $('o-shop').value,
    date: $('o-date').value,
    staff: $('o-staff').value,
    memo: $('o-memo').value,
    items: currentOrderItems
  };
  localStorage.setItem(STORAGE_KEYS.DRAFT_ORDER, JSON.stringify(draft));
}
function loadDraft(type) {
  try {
    if (type === 'order') return JSON.parse(localStorage.getItem(STORAGE_KEYS.DRAFT_ORDER) || 'null');
    if (type === 'shop') return JSON.parse(localStorage.getItem(STORAGE_KEYS.DRAFT_SHOP) || 'null');
    if (type === 'item') return JSON.parse(localStorage.getItem(STORAGE_KEYS.DRAFT_ITEM) || 'null');
  } catch (e) { return null; }
}
function clearDraft(type) {
  if (type === 'order') localStorage.removeItem(STORAGE_KEYS.DRAFT_ORDER);
  if (type === 'shop') localStorage.removeItem(STORAGE_KEYS.DRAFT_SHOP);
  if (type === 'item') localStorage.removeItem(STORAGE_KEYS.DRAFT_ITEM);
}

async function saveOrder(editingOrder) {
  const shop = $('o-shop').value;
  if (!shop) { alert('店舗名を選択してください'); return; }
  const validItems = currentOrderItems.filter(it => it.itemId);
  if (validItems.length === 0) { alert('少なくとも1つの商品を選択してください'); return; }

  validItems.forEach(it => {
    const m = state.items.find(x => x.id === it.itemId);
    if (m) { it.name = m.name; it.type = m.type; }
    if (!it.type) it.type = 'bean';
    // 顧客注文を編集しても数量・挽き方を消さない（新規の店舗用発注は数量1のまま）
    it.quantity = Math.max(1, Number(it.quantity) || 1);
    it.amount = Number(it.amount) > 0 ? Number(it.amount) : '';
  });
  const missingVariant = validItems.find(it => {
    const m = state.items.find(x => x.id === it.itemId);
    return m && variantsForItem(m, 'shop').length > 0 && !String(it.variant || '').trim();
  });
  if (missingVariant) {
    alert('容量・種類を選択してください');
    return;
  }

  const order = {
    id: editingOrder ? editingOrder.id : uid(),
    shop,
    items: validItems,
    date: $('o-date').value,
    // 編集時は元の注文情報（配送先・支払い方法・注文経路など）を保持する
    delivery: editingOrder ? (editingOrder.delivery || '') : '',
    place: editingOrder ? (editingOrder.place || '') : '',
    paymentMethod: editingOrder ? (editingOrder.paymentMethod || '') : '',
    staff: $('o-staff').value,
    memo: $('o-memo').value,
    status: editingOrder ? editingOrder.status : 'received',
    createdAt: editingOrder ? editingOrder.createdAt : new Date().toISOString(),
    completedAt: editingOrder ? editingOrder.completedAt : '',
    completedBy: editingOrder ? editingOrder.completedBy : '',
    orderSource: editingOrder ? (editingOrder.orderSource || 'staff') : 'staff',
    receptionSource: editingOrder ? (editingOrder.receptionSource || '') : '',
    customerName: editingOrder ? (editingOrder.customerName || '') : '',
    shopId: editingOrder ? (editingOrder.shopId || '') : '',
    canceledAt: editingOrder ? (editingOrder.canceledAt || '') : '',
    canceledFromStatus: editingOrder ? (editingOrder.canceledFromStatus || '') : '',
    notifySlack: $('o-notify-slack').checked
  };

  if (editingOrder) {
    const idx = state.orders.findIndex(o => o.id === editingOrder.id);
    if (idx !== -1) state.orders[idx] = order;
  } else {
    state.orders.unshift(order);
  }

  saveCache();
  clearDraft('order');
  closeModal();
  renderAll();
  toast(editingOrder ? '注文を更新しました' : '注文を登録しました');

  if (USE_GOOGLE_SCRIPT || state.gasUrl) {
    const ok = await sendOrQueue(editingOrder ? 'updateOrder' : 'addOrder', order);
    if (ok) {
      await syncFromServer();
      renderAll();
    }
  }
}

// ============================================================
// 店頭受付
// ============================================================
let currentReceptionItems = [];

function receptionVariantGroups(item) {
  if (!item) return [];
  const groups = [
    { key: 'wholesale', label: '卸売', variants: variantsForItem(item, 'wholesale') },
    { key: 'reception', label: '店頭受付', variants: item.receptionVariants || [] }
  ].filter(g => g.variants && g.variants.length);
  return groups;
}

function receptionVariantByKey(item, key) {
  const parts = String(key || '').split('::');
  const source = parts[0] || '';
  const size = parts.slice(1).join('::');
  const group = receptionVariantGroups(item).find(g => g.key === source);
  const variant = group ? group.variants.find(v => String(v.size) === String(size)) : null;
  return { source, size, variant };
}

function receptionItemHtml(item, idx) {
  const selectableItems = state.items.filter(x => receptionVariantGroups(x).length > 0 || x.id === item.itemId);
  const beanOptions = selectableItems.filter(x => x.type === 'bean').map(x =>
    `<option value="${escapeHtml(x.id)}" ${item.itemId === x.id ? 'selected' : ''}>${escapeHtml(x.name)}</option>`
  ).join('');
  const otherOptions = selectableItems.filter(x => x.type !== 'bean').map(x =>
    `<option value="${escapeHtml(x.id)}" ${item.itemId === x.id ? 'selected' : ''}>${escapeHtml(x.name)}</option>`
  ).join('');
  const selected = state.items.find(x => x.id === item.itemId);
  const variantGroups = selected ? receptionVariantGroups(selected) : [];
  const selectedSource = item.variantSource || (selected && (selected.receptionVariants || []).some(v => String(v.size) === String(item.variant)) ? 'reception' : 'wholesale');
  const selectedKey = item.variant ? selectedSource + '::' + item.variant : '';
  const variantOptions = variantGroups.map(group => {
    const options = group.variants.map(v => {
      const key = group.key + '::' + v.size;
      return `<option value="${escapeHtml(key)}" ${selectedKey === key ? 'selected' : ''}>${escapeHtml(v.size)}${v.price ? ' / ' + formatYen(v.price) : ''}</option>`;
    }).join('');
    return `<optgroup label="${escapeHtml(group.label)}">${options}</optgroup>`;
  }).join('');
  return `
    <div class="order-item">
      <div class="order-item-head">
        <span class="order-item-num">#${idx + 1}</span>
        ${currentReceptionItems.length > 1 ? `<button class="order-item-del ri-del" data-idx="${idx}">✕</button>` : ''}
      </div>
      <div class="field" style="margin-bottom:8px;">
        <select class="ri-item-select" data-idx="${idx}">
          <option value="">商品を選択</option>
          ${beanOptions ? `<optgroup label="豆">${beanOptions}</optgroup>` : ''}
          ${otherOptions ? `<optgroup label="その他商品">${otherOptions}</optgroup>` : ''}
        </select>
      </div>
      ${selected && variantGroups.length ? `
        <div class="field" style="margin-bottom:8px;">
          <select class="ri-variant-select" data-idx="${idx}">
            <option value="">容量・種類を選択</option>
            ${variantOptions}
          </select>
        </div>
      ` : ''}
      <div class="field" style="margin-bottom:8px;">
        <label class="field-label" style="font-size:12px; margin-bottom:4px;">数量</label>
        <input type="number" class="ri-qty" data-idx="${idx}" value="${escapeHtml(item.quantity || 1)}" min="1" inputmode="numeric" />
      </div>
      <div class="field" style="margin-bottom:8px;">
        <label class="field-label" style="font-size:12px; margin-bottom:4px;">金額</label>
        <input type="number" class="ri-amount" data-idx="${idx}" value="${escapeHtml(item.amount || '')}" min="0" inputmode="numeric" placeholder="自動入力・変更可" />
      </div>
    </div>
  `;
}

function renderReceptionItems() {
  const container = $('ri-container');
  if (!container) return;
  container.innerHTML = currentReceptionItems.map((it, idx) => receptionItemHtml(it, idx)).join('');
  document.querySelectorAll('.ri-item-select').forEach(el => {
    el.addEventListener('change', () => {
      const idx = +el.dataset.idx;
      const item = state.items.find(x => x.id === el.value);
      currentReceptionItems[idx] = { itemId: el.value, name: item ? item.name : '', type: item ? item.type : 'bean', variant: '', variantSource: '', quantity: 1, amount: '' };
      renderReceptionItems();
    });
  });
  document.querySelectorAll('.ri-variant-select').forEach(el => {
    el.addEventListener('change', () => {
      const idx = +el.dataset.idx;
      const row = currentReceptionItems[idx];
      const item = state.items.find(x => x.id === row.itemId);
      const matched = item ? receptionVariantByKey(item, el.value) : null;
      row.variant = matched ? matched.size : '';
      row.variantSource = matched ? matched.source : '';
      row.amount = matched && matched.variant && Number(matched.variant.price) > 0 ? Number(matched.variant.price) * (Number(row.quantity) || 1) : '';
      renderReceptionItems();
    });
  });
  document.querySelectorAll('.ri-qty').forEach(el => {
    el.addEventListener('input', () => {
      const idx = +el.dataset.idx;
      const row = currentReceptionItems[idx];
      row.quantity = Math.max(1, Number(el.value) || 1);
      const item = state.items.find(x => x.id === row.itemId);
      const selected = receptionVariantByKey(item, (row.variantSource || 'wholesale') + '::' + row.variant);
      const price = selected && selected.variant ? Number(selected.variant.price) || 0 : 0;
      row.amount = price > 0 ? price * row.quantity : row.amount;
      renderReceptionItems();
    });
  });
  document.querySelectorAll('.ri-amount').forEach(el => {
    el.addEventListener('input', () => {
      currentReceptionItems[+el.dataset.idx].amount = el.value;
    });
  });
  document.querySelectorAll('.ri-del').forEach(el => {
    el.addEventListener('click', () => {
      currentReceptionItems.splice(+el.dataset.idx, 1);
      if (!currentReceptionItems.length) currentReceptionItems.push({ itemId: '', variant: '', variantSource: '', quantity: 1, amount: '' });
      renderReceptionItems();
    });
  });
}

  });

async function saveReceptionOrder() {
  const shop = $('r-shop').value;
  if (!shop) { alert('顧客・店舗名を選択してください'); return; }
  const validItems = currentReceptionItems.filter(it => it.itemId);
  if (!validItems.length) { alert('商品を選択してください'); return; }
  const missing = validItems.find(it => {
    const item = state.items.find(x => x.id === it.itemId);
    return item && receptionVariantGroups(item).length > 0 && !it.variant;
  });
  if (missing) { alert('容量・種類を選択してください'); return; }
  validItems.forEach(it => {
    const item = state.items.find(x => x.id === it.itemId);
    if (item) { it.name = item.name; it.type = item.type; }
    it.quantity = Math.max(1, Number(it.quantity) || 1);
    it.amount = Number(it.amount) > 0 ? Number(it.amount) : '';
    if (it.type === 'bean') it.grind = 'whole';
  });
  const order = {
    id: uid(),
    shop,
    items: validItems,
    date: new Date().toISOString().slice(0, 10),
    delivery: $('r-delivery').value,
    place: $('r-place').value,
    staff: $('r-staff').value,
    memo: $('r-memo').value,
    status: 'received',
    createdAt: new Date().toISOString(),
    completedAt: '',
    completedBy: '',
    orderSource: 'reception',
    receptionSource: $('r-source').value,
    customerName: '',
    paymentMethod: '',
    notifySlack: $('r-notify-slack').checked
  };
  state.orders.unshift(order);
  saveCache();
  closeModal();
  renderAll();
  toast('店頭受付を登録しました');
  if (USE_GOOGLE_SCRIPT || state.gasUrl) {
    const ok = await sendOrQueue('addOrder', order);
    if (ok) {
      await syncFromServer();
      renderAll();
    }
  }
}

let currentWholesaleVariants = [];
let currentShopVariants = [];
let currentReceptionVariants = [];

function variantsForItem(item, kind) {
  if (!item) return [];
  if (kind === 'reception') return (item.receptionVariants && item.receptionVariants.length) ? item.receptionVariants : variantsForItem(item, 'shop');
  if (kind === 'shop') return (item.shopVariants && item.shopVariants.length) ? item.shopVariants : (item.variants || []);
  return (item.wholesaleVariants && item.wholesaleVariants.length) ? item.wholesaleVariants : (item.variants || []);
}

function isShopItem(item) {
  return item && (item.useShop === true || String(item.useShop).toLowerCase() === 'true');
}

function variantRowHtml(v, idx, kind) {
  return `
    <div class="variant-row" data-vidx="${idx}" data-kind="${kind}">
      <input type="text" class="vr-size" data-kind="${kind}" data-vidx="${idx}" value="${escapeHtml(v.size || '')}" placeholder="容量・種類（例：500g / 5Pセット）" />
        <input type="number" class="vr-price" data-kind="${kind}" data-vidx="${idx}" value="${escapeHtml(v.price || '')}" placeholder="価格" inputmode="numeric" />
      <button class="variant-del vr-del" data-kind="${kind}" data-vidx="${idx}">✕</button>
    </div>
  `;
}

function variantStore(kind) {
  if (kind === 'reception') return currentReceptionVariants;
  return kind === 'shop' ? currentShopVariants : currentWholesaleVariants;
}

function renderVariants(kind) {
  const c = $(kind === 'reception' ? 'vr-reception-container' : kind === 'shop' ? 'vr-shop-container' : 'vr-wholesale-container');
  if (!c) return;
  c.innerHTML = variantStore(kind).map((v, i) => variantRowHtml(v, i, kind)).join('');
  c.querySelectorAll('.vr-size').forEach(el => {
    el.addEventListener('input', () => {
      const idx = +el.dataset.vidx;
      variantStore(el.dataset.kind)[idx].size = el.value;
    });
  });
  c.querySelectorAll('.vr-price').forEach(el => {
    el.addEventListener('input', () => {
      const idx = +el.dataset.vidx;
      variantStore(el.dataset.kind)[idx].price = el.value;
    });
  });
  c.querySelectorAll('.vr-del').forEach(el => {
    el.addEventListener('click', () => {
      const idx = +el.dataset.vidx;
      const store = variantStore(el.dataset.kind);
      store.splice(idx, 1);
      renderVariants(el.dataset.kind);
    });
  });
}

async function saveItem(editing) {
  const name = $('i-name').value.trim();
  if (!name) { alert('商品名を入力してください'); return; }
  const validWholesaleVariants = currentWholesaleVariants
    .filter(v => v.size)
    .map(v => ({ size: v.size, price: v.price || '' }));
  const validShopVariants = currentShopVariants
    .filter(v => v.size)
    .map(v => ({ size: v.size, price: v.price || '' }));
  const validReceptionVariants = currentReceptionVariants
    .filter(v => v.size)
    .map(v => ({ size: v.size, price: v.price || '' }));
  const targetShopIds = Array.from(document.querySelectorAll('.i-target-shop:checked')).map(el => el.value).join(',');
  if ($('i-visibility').value === 'selected' && !targetShopIds) {
    alert('表示先の顧客を1件以上選択してください');
    return;
  }

  const item = {
    id: editing ? editing.id : uid(),

    type: $('i-type').value || 'bean',
    variants: validWholesaleVariants,
    wholesaleVariants: validWholesaleVariants,

    receptionVariants: validReceptionVariants,
    useWholesale: $('i-use-wholesale').checked,
    useShop: $('i-use-shop').checked,
    useEvent: $('i-use-event').checked,
    imageUrl: $('i-image-url').value,
    hidden: $('i-hidden').checked,
    visibility: $('i-visibility').value,
    targetShopIds: targetShopIds,
    memo: $('i-memo').value,
    createdAt: editing ? editing.createdAt : new Date().toISOString()
  };

  if (editing) {
    const idx = state.items.findIndex(i => i.id === editing.id);
    if (idx !== -1) state.items[idx] = item;

  saveCache();
  closeModal();

      renderAll();
    }
  }
}

function completeOrder(id) {
  const idx = state.orders.findIndex(o => o.id === id);
  if (idx === -1) return;
  const lastBy = localStorage.getItem('imagine_last_completed_by') || '';

  const body = `
    <p style="font-size: 13px; color: var(--text-secondary); margin: 0 0 14px;">受け渡しを担当した人の名前を入力してください</p>
    <div class="field">
      <label class="field-label">受け渡し担当</label>
      <input type="text" id="complete-by" value="${escapeHtml(lastBy)}" placeholder="なまえ" autocomplete="off" />
    </div>
    <button class="btn-primary green" id="complete-confirm" style="margin-bottom: 8px;">完了する</button>
  `;
  openModal('受け渡し完了', body);

  // 自動フォーカス・末尾にカーソル
  setTimeout(() => {
    const el = $('complete-by');
    if (el) {
      el.focus();
      el.setSelectionRange(el.value.length, el.value.length);
    }
  }, 100);

  const submit = async () => {
    const name = ($('complete-by').value || '').trim();
    if (!name) {
      if (!confirm('担当者名なしで完了にしますか？')) return;
    }
    state.orders[idx].status = 'done';
    state.orders[idx].completedAt = new Date().toISOString();
    state.orders[idx].completedBy = name;
    if (name) localStorage.setItem('imagine_last_completed_by', name);
    saveCache();
    closeModal();
    renderAll();
    toast('受け渡し完了にしました');
    if (USE_GOOGLE_SCRIPT || state.gasUrl) {
      await sendOrQueue('updateOrder', state.orders[idx]);
    }
  };

  $('complete-confirm').addEventListener('click', submit);
  $('complete-by').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') submit();
  });
}

async function restoreOrder(id) {
  if (!confirm('この履歴を注文へ戻しますか？')) return;
  const idx = state.orders.findIndex(o => o.id === id);

}

async function cancelOrder(id) {
  if (!confirm('この注文を「削除・取消」に移動しますか？')) return;
  const idx = state.orders.findIndex(o => o.id === id);
  if (idx === -1) return;
  state.orders[idx].canceledFromStatus = state.orders[idx].status || 'received';
  state.orders[idx].status = 'canceled';
  state.orders[idx].canceledAt = new Date().toISOString();
  saveCache();
  renderAll();
  toast('削除・取消へ移動しました');

    await sendOrQueue('updateOrder', state.orders[idx]);
  }
}

async function restoreCanceledOrder(id, status) {
  const message = status === 'done' ? '履歴へ戻しますか？' : '注文へ戻しますか？';
  if (!confirm(message)) return;
  const idx = state.orders.findIndex(o => o.id === id);
  if (idx === -1) return;
  state.orders[idx].status = status;
  state.orders[idx].canceledAt = '';
  state.orders[idx].canceledFromStatus = '';
  if (status === 'received') {
    state.orders[idx].completedAt = '';
    state.orders[idx].completedBy = '';
  }
  saveCache();
  renderAll();
  toast(status === 'done' ? '履歴へ戻しました' : '注文へ戻しました');
  if (USE_GOOGLE_SCRIPT || state.gasUrl) {
    await sendOrQueue('updateOrder', state.orders[idx]);
  }
}

async function duplicateOrder(id) {
  const original = state.orders.find(o => o.id === id);
  if (!original) return;
  if (!confirm('この注文を複製して、新しい注文として登録しますか？')) return;
  const order = JSON.parse(JSON.stringify(original));
  order.id = uid();
  order.status = 'received';
  order.date = new Date().toISOString().slice(0, 10);
  order.createdAt = new Date().toISOString();
  order.completedAt = '';
  order.completedBy = '';
  order.canceledAt = '';
  order.canceledFromStatus = '';
  order.orderSource = 'staff';
  order.memo = order.memo ? order.memo + '\n（複製元: ' + (original.createdAt || original.date || '') + '）' : '（複製元: ' + (original.createdAt || original.date || '') + '）';
  state.orders.unshift(order);
  saveCache();
  renderAll();
  toast('注文を複製しました');
  if (USE_GOOGLE_SCRIPT || state.gasUrl) {
    const ok = await sendOrQueue('addOrder', order);
    if (ok) {
      await syncFromServer();
      renderAll();
    }
  }
}

async function sendWeeklyOrderEmailsFromButton() {
  if (!USE_GOOGLE_SCRIPT && !state.gasUrl) {

      alert('送信対象がありません。顧客にメールアドレスが入っていて、契約中になっているか確認してください。');
      return;
    }

    const rows = targets.map(function(t) {
      const sentBadge = t.sentThisWeek
        ? '<span style="font-size:11px; background:var(--accent-yellow); border:1px solid var(--border); border-radius:999px; padding:2px 8px; margin-left:6px; font-weight:600;">今週送信済み</span>'

            <div style="font-weight:700; font-size:15px;">${escapeHtml(t.name)}${sentBadge}</div>
            <div style="font-size:12px; color:var(--text-secondary); margin-top:2px;">${escapeHtml(t.email)}</div>
          </div>
        </label>
      `;
    }).join('');

    const body = `
      <div class="field">
        <label class="field-label field-required">件名</label>
        <input type="text" id="weekly-mail-subject" value="${escapeHtml(preview.subject || '')}" />
      </div>
      <div class="field">
        <label class="field-label field-required">本文</label>
        <p style="font-size:11px; color:var(--text-secondary); margin:0 0 6px;">※宛名（店舗名・担当者様）は自動で付きます。本文中の {{ORDER_URL}} は各顧客の注文URLに自動置換されます。</p>
        <textarea id="weekly-mail-body" rows="14">${escapeHtml(preview.bodyTemplate || '')}</textarea>
      </div>
      <div style="display:flex; gap:8px; margin-bottom:14px;">
        <button class="btn-small cyan" id="weekly-select-all">全選択</button>
        <button class="btn-small" id="weekly-deselect-all">全解除</button>
      </div>
      <div style="margin-bottom:14px;">${rows}</div>
      <p id="weekly-mail-count" style="font-size:13px; color:var(--text-secondary); margin:0 0 12px; font-weight:600;"></p>
      <button class="btn-primary" id="weekly-send-btn" style="margin-bottom:8px;">送信する</button>
    `;

    openModal('案内メールを送信', body);
    updateWeeklyMailCount();

    $('weekly-select-all').addEventListener('click', function() {
      document.querySelectorAll('.weekly-mail-check').forEach(function(c) { c.checked = true; });
      updateWeeklyMailCount();
    });
    $('weekly-deselect-all').addEventListener('click', function() {
      document.querySelectorAll('.weekly-mail-check').forEach(function(c) { c.checked = false; });
      updateWeeklyMailCount();
    });
    document.querySelectorAll('.weekly-mail-check').forEach(function(c) {
      c.addEventListener('change', updateWeeklyMailCount);
    });

    $('weekly-send-btn').addEventListener('click', async function() {
      const selected = Array.from(document.querySelectorAll('.weekly-mail-check:checked'))
        .map(function(c) { return c.dataset.id; });
      if (selected.length === 0) {
        alert('送信先を1件以上選択してください');
        return;
      }

      const subject = $('weekly-mail-subject').value.trim();
      const bodyTemplate = $('weekly-mail-body').value;
      if (!subject) { alert('件名を入力してください'); return; }
      if (!bodyTemplate.trim()) { alert('本文を入力してください'); return; }

      const sendBtn = $('weekly-send-btn');
      sendBtn.disabled = true;
      sendBtn.textContent = '送信中...';

      try {
        const result = await gasRequest('sendWeeklyOrderEmails', {
          dryRun: false,
          targetShopIds: selected,
          subject: subject,
          bodyTemplate: bodyTemplate
        });
        closeModal();
        toast('案内メールを' + (result.count || 0) + '件送信しました');
        if (result.failed && result.failed.length) {
          alert('送信できなかった宛先があります（' + result.failed.length + '件）:\n' + result.failed.join('\n'));
        }
        await syncFromServer();
        renderAll();
      } catch (e) {
        alert('送信できませんでした: ' + (e.message || e));
        sendBtn.disabled = false;
        sendBtn.textContent = '送信する';
      }
    });

  } catch (e) {
    alert('確認できませんでした: ' + (e.message || e));
  } finally {
    btn.disabled = false;
    btn.textContent = original;
  }
}

        <input type="checkbox" id="price-list-enabled" ${enabled ? 'checked' : ''} style="width:auto;" />
        登録ページに表示する
      </label>
    </div>
    <div class="field">
      <label class="field-label">価格表の内容</label>
      <p style="font-size:11px; color:var(--text-secondary); margin:0 0 6px;">
        「# 見出し」で見出しを作成。「区分|価格|単位|参考上代」のように半角の｜（パイプ）で区切ると表になります（不要な項目は空欄でOK）。｜を含まない行はそのまま注意書きとして表示されます。
      </p>
      <textarea id="price-list-value" rows="20">${escapeHtml(value)}</textarea>
    </div>
    <button class="btn-primary cyan" id="save-price-list" style="margin-bottom:8px;">保存する</button>
  `;
  openModal('卸販売価格表の編集', body);
  $('save-price-list').addEventListener('click', savePriceListFromModal);
}

async function savePriceListFromModal() {
  const payload = {
    enabled: $('price-list-enabled').checked,
    value: $('price-list-value').value
  };
  try {
    await gasRequest('savePriceList', payload);
    closeModal();
    toast('価格表を保存しました');
    await syncFromServer();
    renderAll();
  } catch (e) {
    alert('保存できませんでした: ' + (e.message || e));
  }
}

// ============================================================
// イベント
// ============================================================
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    document.querySelectorAll('.tab-panel').forEach(p => p.style.display = 'none');
    $('tab-' + t.dataset.tab).style.display = 'block';
    state.currentTab = t.dataset.tab;
    localStorage.setItem(STORAGE_KEYS.CURRENT_TAB, t.dataset.tab);
  });
});

function restoreTab() {
  let tab = state.currentTab;
  if (!$('tab-' + tab)) {
    tab = 'orders';
    state.currentTab = tab;
    localStorage.setItem(STORAGE_KEYS.CURRENT_TAB, tab);
  }
  document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.style.display = 'none');
  const tabBtn = document.querySelector(`.tab[data-tab="${tab}"]`);
  if (tabBtn) tabBtn.classList.add('active');
  const tabPanel = $('tab-' + tab);
  if (tabPanel) tabPanel.style.display = 'block';
}

async function openWeeklyScheduleModal() {
  let sched = { enabled: false, weekday: 1, hour: 9 };
  try {
    const r = await gasRequest('getWeeklyEmailSchedule', {});
    if (r) sched = { enabled: !!r.enabled, weekday: r.weekday, hour: r.hour };
  } catch (e) {}
  const days = ['日曜','月曜','火曜','水曜','木曜','金曜','土曜'];
  const dayOpts = days.map((d,i)=>`<option value="${i}" ${sched.weekday===i?'selected':''}>${d}</option>`).join('');
  let hourOpts = '';
  for (let h=0; h<24; h++) hourOpts += `<option value="${h}" ${sched.hour===h?'selected':''}>${('0'+h).slice(-2)}:00</option>`;
  const body = `
    <p style="font-size:13px; color:var(--text-secondary); margin:0 0 14px;">毎週、指定した曜日・時刻に、対象のお客さん全員へ注文ページの案内メールを自動送信します。件名・本文は「今週の案内メール」の標準フォーマットを使います。</p>
    <div class="field">
      <label style="display:flex; align-items:center; gap:8px; font-size:14px; font-weight:600;">
        <input type="checkbox" id="wsch-enabled" ${sched.enabled?'checked':''} style="width:auto; box-shadow:none;" />
        自動送信をオンにする
      </label>
    </div>
    <div class="field">
      <label class="field-label">曜日</label>
      <select id="wsch-weekday">${dayOpts}</select>
    </div>
    <div class="field">
      <label class="field-label">時刻</label>
      <select id="wsch-hour">${hourOpts}</select>
    </div>
    <button class="btn-primary green" id="wsch-save" style="margin-bottom:8px;">保存する</button>
  `;
  openModal('週次メール 自動送信設定', body);
  $('wsch-save').addEventListener('click', saveWeeklyScheduleFromModal);
}

async function saveWeeklyScheduleFromModal() {
  const payload = {
    enabled: $('wsch-enabled').checked,
    weekday: parseInt($('wsch-weekday').value, 10),
    hour: parseInt($('wsch-hour').value, 10)
  };
  try {
    await gasRequest('setWeeklyEmailSchedule', payload);
    closeModal();
    toast(payload.enabled ? '毎週の自動送信を設定しました' : '自動送信をオフにしました');
  } catch (e) {
    alert('保存できませんでした: ' + (e.message || e));
  }
}

$('add-order-btn').addEventListener('click', () => openOrderModal());
$('add-reception-btn').addEventListener('click', openReceptionModal);
$('add-shop-btn').addEventListener('click', () => openShopModal());
$('add-item-btn').addEventListener('click', () => openItemModal());
$('send-weekly-mails-btn').addEventListener('click', sendWeeklyOrderEmailsFromButton);
$('weekly-schedule-btn').addEventListener('click', openWeeklyScheduleModal);
$('send-custom-mail-btn').addEventListener('click', openCustomEmailModal);
$('copy-signup-url-btn').addEventListener('click', async () => {
  let url;
  try {
    url = location.origin + location.pathname.replace(/[^/]*$/, '') + 'signup.html';
  } catch (e) {
    alert('新規登録URLを作成できませんでした: ' + e.message);
    return;
  }
  try {
    await navigator.clipboard.writeText(url);
    toast('新規登録URLをコピーしました');
  } catch (e) {
    alert(url);
  }
});
$('edit-notice-btn').addEventListener('click', openNoticeModal);
$('edit-price-list-btn').addEventListener('click', openPriceListModal);

// 焙煎計画イベント
$('planning-from').addEventListener('change', renderPlanning);
$('planning-to').addEventListener('change', renderPlanning);
$('planning-clear-filter').addEventListener('click', () => {
  $('planning-from').value = '';
  $('planning-to').value = '';
  renderPlanning();
});
$('planning-select-all').addEventListener('click', () => {
  getPlanningTargetOrders().forEach(o => planningSelected.add(o.id));
  renderPlanning();
});
$('planning-deselect-all').addEventListener('click', () => {
  planningSelected.clear();
  renderPlanning();
});
$('planning-print').addEventListener('click', printPlanningResult);

$('config-toggle').addEventListener('click', () => {
  $('config-panel').classList.toggle('open');
});

$('save-config').addEventListener('click', async () => {
  const url = $('gas-url').value.trim();
  if (!url) {
    alert('URLを入力してください');
    return;
  }
  if (!confirm('この設定で接続テストを行います。よろしいですか？')) return;
  state.gasUrl = url;
  localStorage.setItem(STORAGE_KEYS.GAS_URL, url);
  toast('接続テスト中…');
  const ok = await syncFromServer();
  if (ok) {
    toast('接続成功！データを同期しました');
    renderAll();
  } else {
    toast('接続失敗。URLを確認してください');
  }
});

// ============================================================
// 初期化
// ============================================================
async function init() {
  loadCache();
  restoreTab();
  if (USE_GOOGLE_SCRIPT) {
    // Apps Scriptから配信されている場合：設定不要
    setOnline(false);
    renderAll();
    await syncFromServer();
    renderAll();
    setInterval(syncFromServer, 30000);
  } else if (state.gasUrl) {
    // ローカルから開いた場合：保存済みURLで接続
    $('gas-url').value = state.gasUrl;
    setOnline(false);
    renderAll();
    await syncFromServer();
    renderAll();
    setInterval(syncFromServer, 30000);
  } else {
    // ローカルから開いてURL未設定の場合：設定パネル表示
    setOnline(false);
    $('config-panel').style.display = 'block';
    $('config-panel').classList.add('open');
    renderAll();
  }
}

init();
</script>
